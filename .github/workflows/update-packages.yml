name: Update packages

on:
  schedule:
    # Runs at 01:00 on the 15th day of every month
    - cron: "1 0 15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: yarn install:all

      - name: Update packages
        run: yarn upgrade:dependencies

      - name: Run build
        run: yarn build:all

      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          shopt -s globstar nullglob
          lockfiles=(**/yarn.lock)
          packagefiles=(**/package.json)
          files_to_stage=("${lockfiles[@]}" "${packagefiles[@]}")
          if [ ${#files_to_stage[@]} -eq 0 ]; then
            echo "No yarn.lock or package.json files found"
            exit 0
          fi
          git add "${files_to_stage[@]}"
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update packages"
          git push origin HEAD:${{ github.ref_name }}
